name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        # Brak commitowanego package-lock.json (nie da się go wygenerować w
        # środowisku bez dostępu do rejestru npm) -> używamy npm install.
        run: npm install --no-audit --no-fund

      # Build jako pierwszy: generuje next-env.d.ts oraz sam sprawdza typy i ESLint.
      - name: Build
        run: npm run build
        env:
          # Wartości placeholder — build nie może zależeć od realnych sekretów.
          NEXT_PUBLIC_SITE_URL: https://example.com
          NEXT_PUBLIC_SANITY_PROJECT_ID: dummy
          NEXT_PUBLIC_SANITY_DATASET: production

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint
